const toggleGroup=(name)=>{const n=new Set(selected);if(n.has(name))n.delete(name);else n.add(name);setSelected(n)};
return <Modal onClose={onClose} width={560}>
<div style={{padding:"20px 24px",borderBottom:`1px solid ${C.border}`}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:17,fontWeight:700}}>選擇檢測對象</span><span onClick={onClose} style={{cursor:"pointer",fontSize:20,color:C.textThi}}>✕</span></div></div>
<div style={{padding:"20px 24px",overflowY:"auto",flex:1}}>
  <div style={{display:"flex",gap:8,marginBottom:16}}>{[{id:"all",l:"全部裝置"},{id:"group",l:"依群組選擇"}].map(m=><div key={m.id} onClick={()=>{setMode(m.id);setSelected(new Set(m.id==="all"?["全部裝置"]:[]))}} style={{flex:1,padding:"10px 14px",borderRadius:8,border:`2px solid ${mode===m.id?C.primary:C.border}`,background:mode===m.id?C.primaryLight:C.white,cursor:"pointer",textAlign:"center",fontSize:13,fontWeight:600,color:mode===m.id?C.primary:C.textSec}}>{m.l}</div>)}</div>

    <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${selected.has(g.name)?C.primary:C.border}`,background:selected.has(g.name)?C.primary:"#fff",display:"flex",alignItems:"center",justifyContent:"center"}}>{selected.has(g.name)&&<svg width={12} height={12} viewBox="0 0 24 24" fill="#fff"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>}</div>

    <span style={{fontSize:12,color:C.textThi}}>{g.count} 台</span>
  </div>)}</div>}
  <div style={{marginTop:16,padding:"12px 16px",background:"#FAFAFA",borderRadius:8,border:`1px solid ${C.borderLight}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:13,color:C.textSec}}>已選擇裝置</span><span style={{fontSize:20,fontWeight:700,color:C.primary}}>{total} 台</span></div>
</div>
<div style={{padding:"16px 24px",borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"flex-end",gap:8}}><Btn onClick={onClose}>取消</Btn><Btn primary onClick={()=>{onConfirm(total);onClose()}}>確認選擇</Btn></div>
</Modal>};

// ── Schedule Edit Modal ──

const weekdays=["日","一","二","三","四","五","六"];

  </div>
  <div><div style={{fontSize:12,fontWeight:600,color:C.textSec,marginBottom:6}}>執行時間</div>
    <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{["00:00","02:00","04:00","06:00","08:00","12:00","18:00","22:00"].map(t=><div key={t} onClick={()=>setTime(t)} style={{padding:"6px 12px",borderRadius:6,border:`1px solid ${time===t?C.primary:C.border}`,background:time===t?C.primaryLight:C.white,fontSize:12,cursor:"pointer",color:time===t?C.primary:C.textSec,fontWeight:time===t?600:400}}>{t}</div>)}</div>
  </div>
  {freq==="weekly"&&<div><div style={{fontSize:12,fontWeight:600,color:C.textSec,marginBottom:6}}>星期</div>
    <div style={{display:"flex",gap:6}}>{weekdays.map((d,i)=><div key={i} onClick={()=>setWeekday(i)} style={{width:40,height:36,borderRadius:6,border:`1px solid ${weekday===i?C.primary:C.border}`,background:weekday===i?C.primaryLight:C.white,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,cursor:"pointer",color:weekday===i?C.primary:C.textSec,fontWeight:weekday===i?600:400}}>{d}</div>)}</div>
  </div>}
  {freq==="monthly"&&<div><div style={{fontSize:12,fontWeight:600,color:C.textSec,marginBottom:6}}>日期</div>
    <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{[1,5,10,15,20,25,28].map(d=><div key={d} onClick={()=>setMonthDay(d)} style={{padding:"6px 12px",borderRadius:6,border:`1px solid ${monthDay===d?C.primary:C.border}`,background:monthDay===d?C.primaryLight:C.white,fontSize:12,cursor:"pointer",color:monthDay===d?C.primary:C.textSec,fontWeight:monthDay===d?600:400}}>{d} 日</div>)}</div>
  </div>}
  <div><div style={{fontSize:12,fontWeight:600,color:C.textSec,marginBottom:6}}>檢測範圍</div>
    <div style={{display:"flex",gap:6}}>{[{id:"all",l:"全部裝置"},{id:"group",l:"指定群組"}].map(s=><div key={s.id} onClick={()=>setScope(s.id)} style={{flex:1,padding:"8px",borderRadius:6,border:`2px solid ${scope===s.id?C.primary:C.border}`,background:scope===s.id?C.primaryLight:C.white,textAlign:"center",fontSize:13,fontWeight:600,color:scope===s.id?C.primary:C.textSec,cursor:"pointer"}}>{s.l}</div>)}</div>
  </div>
  {scope==="group"&&<div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:180,overflowY:"auto",padding:2}}>
    {allDeviceGroups.filter(g=>g.name!=="全部裝置").map(g=><div key={g.name} onClick={()=>toggleGrp(g.name)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:6,border:`1px solid ${selGroups.has(g.name)?C.primary:C.borderLight}`,background:selGroups.has(g.name)?C.primaryLight:C.white,cursor:"pointer"}}>

      <span style={{flex:1,fontSize:12}}>{g.name}</span>
      <span style={{fontSize:11,color:C.textThi}}>{g.count} 台</span>
    </div>)}
  </div>}
  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderTop:`1px solid ${C.borderLight}`}}><span style={{fontSize:13}}>完成後寄送 Email 摘要</span><Toggle on={notifyDone} onToggle={()=>setNotifyDone(!notifyDone)}/></div>

          {isNum?<input type="number" placeholder="值" value={val} onChange={e=>setVal(e.target.value)} style={{flex:1,padding:"8px 10px",borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,minWidth:60}}/>
          :<select value={val} onChange={e=>setVal(e.target.value)} style={{flex:1,padding:"8px 10px",borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,minWidth:72}}>{boolVals.map(o=><option key={o}>{o}</option>)}</select>}
          <span style={{fontSize:13,color:C.textSec,flexShrink:0}}>時觸發</span>
        </div>
      </div>
      <div style={{display:"flex",gap:10}}>
        <div style={{flex:1}}><label style={{fontSize:12,fontWeight:600,color:C.textSec,marginBottom:6,display:"block"}}>風險等級</label><div style={{display:"flex",gap:6}}>{[{l:"高",c:C.red,bg:C.redBg},{l:"中",c:C.orange,bg:C.orangeBg},{l:"低",c:C.blue,bg:C.blueBg}].map(r=><div key={r.l} onClick={()=>setRisk(r.l)} style={{flex:1,padding:"8px",borderRadius:6,cursor:"pointer",border:`2px solid ${risk===r.l?r.c:C.border}`,background:risk===r.l?r.bg:C.white,textAlign:"center",fontSize:13,fontWeight:600,color:risk===r.l?r.c:C.textThi}}>{r.l}</div>)}</div></div>
        <div style={{width:160}}><label style={{fontSize:12,fontWeight:600,color:C.textSec,marginBottom:6,display:"block"}}>觸發通知</label><div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0"}}><Toggle on={notify} onToggle={()=>setNotify(!notify)}/><span style={{fontSize:13,color:notify?C.primary:C.textThi}}>{notify?"開啟":"關閉"}</span></div></div>
      </div>
      <div><label style={{fontSize:12,fontWeight:600,color:C.textSec,marginBottom:4,display:"block"}}>建議修復方式（選填）</label><textarea value={rem} onChange={e=>setRem(e.target.value)} placeholder="例：請至 Windows Update 執行系統更新" style={{width:"100%",padding:"8px 12px",borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,resize:"vertical",minHeight:50}}/></div>
    </div>
    <div style={{padding:"14px 24px",borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"flex-end",gap:8,flexShrink:0}}><Btn onClick={onClose}>取消</Btn><Btn primary onClick={()=>{setSaving(true);setTimeout(()=>{setSaving(false);onClose()},1200)}} disabled={saving||!name}>{saving?"儲存中...":"儲存規則"}</Btn></div>
  </Modal>;
};

const RulesPage=()=>{const[df,setDf]=useState("全部領域");const[rf,setRf]=useState("全部");const[rules,setRules]=useState(rulesInit);const[search,setSearch]=useState("");const[showForm,setShowForm]=useState(false);const[editRule,setEditRule]=useState(null);const[delRule,setDelRule]=useState(null);
const filtered=rules.filter(r=>(df==="全部領域"||r.dom===df)&&(rf==="全部"||r.risk===rf)&&(!search||r.name.includes(search)));
const openEdit=r=>{setEditRule(r);setShowForm(true)};
return <div style={{padding:24,display:"flex",gap:16}}>
  <div style={{flex:1,minWidth:0}}>
    <div style={{background:"#FAFAFA",borderRadius:8,border:`1px solid ${C.border}`,padding:"14px 20px",marginBottom:14}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontWeight:700,fontSize:15}}>檢測設定</span><div style={{display:"flex",gap:8}}><Btn small>還原預設</Btn><Btn small primary>儲存並套用</Btn></div></div><div style={{fontSize:12,color:C.textSec,marginTop:4}}>設定各檢測規則的門檻與風險等級。最後修改：2026/02/22 23:10</div></div>
    <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="搜尋規則名稱" style={{padding:"7px 12px",borderRadius:6,border:`1px solid ${C.border}`,fontSize:13,width:180}}/><select value={df} onChange={e=>setDf(e.target.value)} style={{padding:"7px 12px",borderRadius:6,border:`1px solid ${C.border}`,fontSize:13}}>{["全部領域","安全性狀態","政策合規","系統更新","硬體健康"].map(d=><option key={d}>{d}</option>)}</select><select value={rf} onChange={e=>setRf(e.target.value)} style={{padding:"7px 12px",borderRadius:6,border:`1px solid ${C.border}`,fontSize:13}}>{["全部","高","中","低"].map(r=><option key={r}>{r}</option>)}</select><div style={{flex:1}}/><Btn primary onClick={()=>{setEditRule(null);setShowForm(true)}}>+ 新增規則</Btn></div>
    <div style={{background:C.white,borderRadius:8,border:`1px solid ${C.border}`,overflow:"hidden"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}><thead><tr><TH>啟用</TH><TH>領域</TH><TH>規則名稱</TH><TH>條件</TH><TH>ISO</TH><TH>風險</TH><TH>通知</TH><TH>更新</TH><TH>動作</TH></tr></thead><tbody>
      {filtered.map(r=><TR key={r.id} onClick={()=>openEdit(r)}><TD><Toggle on={r.on} onToggle={()=>{const nr=[...rules];const idx=nr.findIndex(x=>x.id===r.id);nr[idx]={...nr[idx],on:!nr[idx].on};setRules(nr)}}/></TD><TD style={{fontSize:12,color:C.textSec}}>{r.dom}</TD><TD style={{fontWeight:500}}>{r.name}</TD><TD style={{fontSize:12,color:C.textSec}}>{r.cond}</TD><TD style={{fontFamily:"monospace",fontSize:11,color:r.iso?C.primary:C.textThi,fontWeight:r.iso?600:400}}>{r.iso||"—"}</TD><TD><RiskBadge level={r.risk}/></TD><TD>{r.notify?<Badge type="success" text="開"/>:<Badge type="gray" text="關"/>}</TD><TD style={{fontSize:12,color:C.textThi,whiteSpace:"nowrap"}}>{r.date}</TD><TD><KebabMenu items={[{label:"編輯",onClick:()=>openEdit(r)},{label:"複製",onClick:()=>setRules([...rules,{...r,id:r.id+"-c",name:r.name+" (副本)"}])},{label:"刪除",danger:true,onClick:()=>setDelRule(r)}]}/></TD></TR>)}
    </tbody></table></div>
  </div>
  <div style={{width:230,flexShrink:0}}><div style={{background:C.white,borderRadius:8,border:`1px solid ${C.border}`,padding:16,position:"sticky",top:20}}><div style={{fontSize:14,fontWeight:700,marginBottom:12}}>影響預覽</div><div style={{textAlign:"center",marginBottom:12}}><div style={{fontSize:34,fontWeight:800,color:C.primary}}>120 <span style={{fontSize:14}}>台</span></div><div style={{fontSize:12,color:C.textSec}}>受影響裝置</div></div><div style={{fontSize:13,fontWeight:600,marginBottom:6}}>風險分佈</div>{[{l:"高風險",n:22,c:C.red,p:18},{l:"中風險",n:45,c:C.orange,p:38},{l:"低風險",n:53,c:C.blue,p:44}].map(r=><div key={r.l} style={{marginBottom:6}}><div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:2}}><span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:6,height:6,borderRadius:99,background:r.c}}/>{r.l}</span><span style={{fontWeight:600}}>{r.n}</span></div><Bar value={r.p} color={r.c} h={4}/></div>)}</div></div>
  {showForm&&<RuleFormModal editRule={editRule} onClose={()=>{setShowForm(false);setEditRule(null)}}/>}
  {delRule&&<Modal onClose={()=>setDelRule(null)} width={400}><div style={{padding:24}}><div style={{fontSize:17,fontWeight:700,marginBottom:8}}>確認刪除</div><div style={{fontSize:13,color:C.textSec,marginBottom:18}}>確定要刪除「<b style={{color:C.text}}>{delRule.name}</b>」？此操作無法復原。</div><div style={{display:"flex",justifyContent:"flex-end",gap:8}}><Btn onClick={()=>setDelRule(null)}>取消</Btn><Btn danger onClick={()=>{setRules(rules.filter(x=>x.id!==delRule.id));setDelRule(null)}}>確認刪除</Btn></div></div></Modal>}
</div>};

// ── Notification Settings ──
const NotifyPage=()=>{const[globalOn,setGlobalOn]=useState(true);const[emails,setEmails]=useState(["admin@wisecore.com","it@wisecore.com"]);const[newEmail,setNewEmail]=useState("");const[webhook,setWebhook]=useState(false);const[onComplete,setOnComplete]=useState(true);const[onSchedule,setOnSchedule]=useState(true);const[dailyDigest,setDailyDigest]=useState(false);
return <div style={{padding:24,maxWidth:760}}>
  <div style={{background:C.white,borderRadius:8,border:`1px solid ${C.border}`,padding:20,marginBottom:16}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><div style={{fontSize:16,fontWeight:700}}>通知設定</div><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:13,color:globalOn?C.primary:C.textThi}}>{globalOn?"已啟用":"已停用"}</span><Toggle on={globalOn} onToggle={()=>setGlobalOn(!globalOn)}/></div></div>
    {!globalOn&&<div style={{background:C.orangeBg,borderRadius:8,padding:"10px 14px",border:`1px solid ${C.orangeBorder}`,fontSize:13,color:C.orange}}>通知已停用，所有規則的觸發通知將不會發送。</div>}
    {globalOn&&<>
      {/* Email */}
      <div style={{marginBottom:20}}>
        <div style={{fontSize:14,fontWeight:600,marginBottom:10}}>Email 通知</div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {emails.map((e,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:"#FAFAFA",borderRadius:6,border:`1px solid ${C.borderLight}`}}><span style={{flex:1,fontSize:13}}>{e}</span><span onClick={()=>setEmails(emails.filter((_,j)=>j!==i))} style={{cursor:"pointer",color:C.textThi,fontSize:16}}>✕</span></div>)}
          <div style={{display:"flex",gap:8}}><input value={newEmail} onChange={e=>setNewEmail(e.target.value)} placeholder="新增收件人 Email" style={{flex:1,padding:"8px 12px",borderRadius:6,border:`1px solid ${C.border}`,fontSize:13}}/><Btn small primary onClick={()=>{if(newEmail&&newEmail.includes("@")){setEmails([...emails,newEmail]);setNewEmail("")}}}>新增</Btn></div>
        </div>
      </div>
      {/* Webhook (Phase 2 preview) */}
      <div style={{marginBottom:20,opacity:0.5}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><div style={{fontSize:14,fontWeight:600}}>Webhook</div><Badge type="gray" text="Phase 2"/></div>
        <div style={{padding:"8px 12px",background:"#FAFAFA",borderRadius:6,border:`1px solid ${C.borderLight}`,fontSize:13,color:C.textThi}}>Slack / Teams / 自訂 Webhook（即將推出）</div>
      </div>
      {/* Trigger conditions */}
      <div>
        <div style={{fontSize:14,fontWeight:600,marginBottom:10}}>觸發條件</div>
        {[{label:"健檢完成後，若有高風險項目立即通知",on:onComplete,toggle:()=>setOnComplete(!onComplete)},{label:"排程健檢完成後寄送摘要報告",on:onSchedule,toggle:()=>setOnSchedule(!onSchedule)},{label:"每日高風險摘要（每天 09:00）",on:dailyDigest,toggle:()=>setDailyDigest(!dailyDigest)}].map((c,i)=><div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderTop:i>0?`1px solid ${C.borderLight}`:"none"}}>
          <span style={{fontSize:13}}>{c.label}</span><Toggle on={c.on} onToggle={c.toggle}/>
        </div>)}
      </div>
      <div style={{marginTop:16,padding:"10px 14px",background:"#FAFAFA",borderRadius:8,fontSize:12,color:C.textSec}}>
        個別規則的通知開關可在「規則設定」頁面調整。高風險規則預設開啟通知，中/低風險預設關閉。
      </div>
    </>}
  </div>
  {/* Preview */}
  <div style={{background:C.white,borderRadius:8,border:`1px solid ${C.border}`,padding:20}}>
    <div style={{fontSize:14,fontWeight:600,marginBottom:12}}>Email 通知預覽</div>
    <div style={{background:"#FAFAFA",borderRadius:8,padding:16,border:`1px solid ${C.borderLight}`,fontSize:13}}>
      <div style={{fontWeight:600,marginBottom:8}}>[WiseCore] IT 健檢發現高風險項目 (4 項)</div>
      <div style={{color:C.textSec,marginBottom:10,fontSize:12}}>健檢時間：2026/02/22 23:03 | 掃描裝置：500 台 | 整體評分：92%</div>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><thead><tr style={{background:"#EEEEEE"}}><th style={{padding:"6px 10px",textAlign:"left"}}>規則</th><th style={{padding:"6px 10px",textAlign:"left"}}>影響裝置數</th><th style={{padding:"6px 10px",textAlign:"left"}}>風險等級</th></tr></thead><tbody>
        {[["UPD-001 Windows 超過 30 天未更新","120 台 (24%)","高"],["POL-005 偵測到未授權軟體","45 台 (9%)","高"],["POL-001 密碼長度不足 8 碼","15 台 (3%)","高"],["HW-001 磁碟使用率超過 90%","8 台 (1.6%)","高"]].map((r,i)=><tr key={i} style={{borderTop:"1px solid #E0E0E0"}}><td style={{padding:"6px 10px"}}>{r[0]}</td><td style={{padding:"6px 10px"}}>{r[1]}</td><td style={{padding:"6px 10px"}}><RiskBadge level={r[2]}/></td></tr>)}
      </tbody></table>
      <div style={{marginTop:10}}><span style={{color:C.primary,textDecoration:"underline",cursor:"pointer"}}>查看完整報告 →</span></div>
    </div>
  </div>
</div>};

// ── App ──
function App(){const[tab,setTab]=useState("overview");const[dimDetail,setDimDetail]=useState(null);const[exp,setExp]=useState(null);const[view,setView]=useState(null);const[showExport,setShowExport]=useState(false);
return <div style={{display:"flex",minHeight:"100vh",background:C.bg}}>
  <Sidebar exp={exp} setExp={setExp}/>
  <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
    <TopBar/><PageHeader/>
    {!dimDetail&&!view&&<TabBar tab={tab} setTab={t=>{setTab(t);setDimDetail(null);setView(null)}}/>}
    <div style={{flex:1,overflowY:"auto"}}>
      {view==="report"?<ReportPage onBack={()=>setView(null)} setShowExport={setShowExport}/>
      :tab==="overview"&&!dimDetail?<OverviewPage setDimDetail={setDimDetail} setView={setView} setShowExport={setShowExport}/>
      :tab==="overview"&&dimDetail?<DimDetailPage dimId={dimDetail} onBack={()=>setDimDetail(null)}/>
      :tab==="history"?<HistoryPage/>
      :tab==="rules"?<RulesPage/>
      :tab==="notify"?<NotifyPage/>:null}
    </div>
  </div>
  {showExport&&<ExportModal onClose={()=>setShowExport(false)}/>}
</div>}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
